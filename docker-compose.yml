# =============================================================
# Big Data Processing - Final Project
# Pipeline: Kafka (ingest) -> Spark (batch + streaming) ->
#           HDFS (distributed storage) -> Streamlit (dashboard)
# =============================================================

services:

  # -----------------------------
  # Zookeeper (required by Kafka)
  # -----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bigdata-net

  # -----------------------------
  # Kafka broker (stream ingest)
  # -----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS NameNode (distributed storage - master)
  # -----------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"     # Web UI (Hadoop 3.x)
      - "9000:9000"     # HDFS RPC (fs.defaultFS)
    environment:
      - CLUSTER_NAME=bigdata-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9870 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS DataNode (distributed storage - worker)
  # -----------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    depends_on:
      - namenode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
      - SERVICE_PRECONDITION=namenode:9870
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS bootstrap - creates project directories AND uploads events.csv
  # so the batch job can read the dataset from HDFS itself.
  # -----------------------------
  hdfs-setup:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-setup
    depends_on:
      - namenode
      - datanode
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    volumes:
      - ./data:/data:ro
    entrypoint: >
      /bin/bash -c "
      echo 'Waiting for HDFS to leave safemode...';
      for i in $$(seq 1 60); do
        if hdfs dfsadmin -fs hdfs://namenode:9000 -safemode get 2>/dev/null | grep -q 'OFF'; then
          echo 'HDFS is out of safemode';
          break;
        fi;
        echo \"Attempt $$i: HDFS not ready, retrying in 3s...\";
        sleep 3;
      done;
      hdfs dfs -fs hdfs://namenode:9000 -mkdir -p /raw-data &&
      hdfs dfs -fs hdfs://namenode:9000 -mkdir -p /raw-events &&
      hdfs dfs -fs hdfs://namenode:9000 -mkdir -p /batch-results &&
      hdfs dfs -fs hdfs://namenode:9000 -mkdir -p /stream-results &&
      hdfs dfs -fs hdfs://namenode:9000 -chmod -R 777 /raw-data /raw-events /batch-results /stream-results;
      echo '-----';
      if [ -f /data/events.csv ]; then
        echo 'Uploading events.csv to HDFS /raw-data/events.csv...';
        if hdfs dfs -fs hdfs://namenode:9000 -test -e /raw-data/events.csv; then
          echo 'events.csv already exists in HDFS, skipping upload.';
        else
          hdfs dfs -fs hdfs://namenode:9000 -copyFromLocal /data/events.csv /raw-data/events.csv &&
          echo 'events.csv uploaded to HDFS successfully.';
        fi;
        hdfs dfs -fs hdfs://namenode:9000 -ls -h /raw-data;
      else
        echo 'WARN: /data/events.csv not found - skipping HDFS upload. Batch job will fail until events.csv is available.';
      fi;
      echo 'HDFS bootstrap complete';
      exit 0;
      "
    networks:
      - bigdata-net

  # -----------------------------
  # Spark master
  # -----------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      - HADOOP_CONF_DIR=/opt/hadoop-conf
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/jobs
      - ./data:/opt/data
      - ./results:/opt/results
    networks:
      - bigdata-net

  # -----------------------------
  # Spark worker
  # -----------------------------
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./jobs:/opt/jobs
      - ./data:/opt/data
      - ./results:/opt/results
    networks:
      - bigdata-net

  # -----------------------------
  # Kafka producer - reads CSV and
  # streams RetailRocket events
  # -----------------------------
  producer:
    build:
      context: ./producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: events
      DATA_FILE: /data/events.csv
      EVENTS_PER_SECOND: "20"
    volumes:
      - ./data:/data
    networks:
      - bigdata-net
    restart: on-failure

  # -----------------------------
  # Spark Streaming job
  # consumes Kafka -> HDFS + CSV
  # -----------------------------
  streaming-job:
    image: bitnamilegacy/spark:3.5.1
    container_name: streaming-job
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
      namenode:
        condition: service_started
      datanode:
        condition: service_started
    volumes:
      - ./jobs:/opt/jobs
      - ./results:/opt/results
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: >
      /opt/bitnami/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.cores.max=2
      --conf spark.executor.cores=1
      --conf spark.executor.memory=1g
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1
      --conf spark.hadoop.fs.defaultFS=hdfs://namenode:9000
      --conf spark.hadoop.dfs.client.use.datanode.hostname=true
      /opt/jobs/streaming_job.py
    networks:
      - bigdata-net
    restart: on-failure

  # -----------------------------
  # Streamlit dashboard
  # -----------------------------
  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    depends_on:
      - namenode
    ports:
      - "8501:8501"
    environment:
      RESULTS_DIR: /results
      DATA_DIR: /data
      DATA_FILE: /data/events.csv
      HDFS_NAMENODE: http://namenode:9870
    volumes:
      - ./results:/results
      - ./data:/data:ro
    networks:
      - bigdata-net

volumes:
  hadoop_namenode:
  hadoop_datanode:

networks:
  bigdata-net:
    driver: bridge
