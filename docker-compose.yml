# =============================================================
# Big Data Processing - Final Project
# Pipeline: Kafka (ingest) -> Spark (batch + streaming) ->
#           MinIO (distributed storage) + HDFS -> Streamlit (dashboard)
# =============================================================

services:

  # -----------------------------
  # Zookeeper (required by Kafka)
  # -----------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - bigdata-net

  # -----------------------------
  # Kafka broker (stream ingest)
  # -----------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bigdata-net

  # -----------------------------
  # MinIO (S3-compatible storage)
  # acts as the distributed store
  # -----------------------------
  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: minio
    ports:
      - "9000:9000"     # S3 API
      - "9001:9001"     # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live 2>/dev/null || wget -q --spider http://localhost:9000/minio/health/live 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    networks:
      - bigdata-net

  # -----------------------------
  # MinIO bucket bootstrap
  # -----------------------------
  minio-setup:
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    container_name: minio-setup
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be ready...';
      for i in $$(seq 1 60); do
        if mc alias set local http://minio:9000 minioadmin minioadmin 2>/dev/null; then
          echo 'MinIO is ready';
          break;
        fi;
        echo \"Attempt $$i: MinIO not ready yet, retrying in 3s...\";
        sleep 3;
      done;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/raw-events || true;
      mc mb -p local/batch-results || true;
      mc mb -p local/stream-results || true;
      echo 'MinIO buckets ready';
      exit 0;
      "
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS NameNode
  # -----------------------------
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    environment:
      - CLUSTER_NAME=bigdata
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode-data:/hadoop/dfs/name
    ports:
      - "9870:9870"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS DataNode
  # -----------------------------
  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
    volumes:
      - datanode-data:/hadoop/dfs/data
    networks:
      - bigdata-net

  # -----------------------------
  # HDFS init - create directories
  # /user/spark, /data, /results
  # -----------------------------
  hdfs-init:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hdfs-init
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    entrypoint: >
      /bin/bash -c "
      echo 'Waiting for HDFS to exit safe mode...';
      for i in $$(seq 1 30); do
        if hdfs dfsadmin -safemode get 2>/dev/null | grep -q 'Safe mode is OFF'; then
          echo 'HDFS safe mode is OFF';
          break;
        fi;
        echo \"Attempt $$i: HDFS still in safe mode, retrying in 5s...\";
        sleep 5;
      done;
      hdfs dfs -mkdir -p /user/spark &&
      hdfs dfs -mkdir -p /data &&
      hdfs dfs -mkdir -p /results &&
      hdfs dfs -chmod -R 777 /user/spark /data /results &&
      echo 'HDFS directories created successfully';
      exit 0;
      "
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    networks:
      - bigdata-net

  # -----------------------------
  # Spark master
  # -----------------------------
  spark-master:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-master
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./jobs:/opt/jobs
      - ./data:/opt/data
      - ./results:/opt/results
    networks:
      - bigdata-net

  # -----------------------------
  # Spark worker
  # -----------------------------
  spark-worker:
    image: bitnamilegacy/spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_CORES=4
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    volumes:
      - ./jobs:/opt/jobs
      - ./data:/opt/data
      - ./results:/opt/results
    networks:
      - bigdata-net

  # -----------------------------
  # Kafka producer - reads CSV and
  # streams RetailRocket events
  # -----------------------------
  producer:
    build:
      context: ./producer
    container_name: producer
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: events
      DATA_FILE: /data/events.csv
      EVENTS_PER_SECOND: "20"
    volumes:
      - ./data:/data
    networks:
      - bigdata-net
    restart: on-failure

  # -----------------------------
  # Spark Streaming job
  # consumes Kafka -> MinIO + HDFS + CSV
  # -----------------------------
  streaming-job:
    image: bitnamilegacy/spark:3.5.1
    container_name: streaming-job
    depends_on:
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
      minio-setup:
        condition: service_completed_successfully
      hdfs-init:
        condition: service_completed_successfully
    volumes:
      - ./jobs:/opt/jobs
      - ./results:/opt/results
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
    command: >
      /opt/bitnami/spark/bin/spark-submit
      --master spark://spark-master:7077
      --conf spark.cores.max=2
      --conf spark.executor.cores=1
      --conf spark.executor.memory=1g
      --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.1,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=minioadmin
      --conf spark.hadoop.fs.s3a.secret.key=minioadmin
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      --conf spark.hadoop.fs.s3a.connection.ssl.enabled=false
      --conf spark.hadoop.dfs.client.use.datanode.hostname=true
      /opt/jobs/streaming_job.py
    networks:
      - bigdata-net
    restart: on-failure

  # -----------------------------
  # Streamlit dashboard
  # -----------------------------
  dashboard:
    build:
      context: ./dashboard
    container_name: dashboard
    depends_on:
      - minio
    ports:
      - "8501:8501"
    environment:
      RESULTS_DIR: /results
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./results:/results
    networks:
      - bigdata-net

volumes:
  minio-data:
  namenode-data:
  datanode-data:

networks:
  bigdata-net:
    driver: bridge
